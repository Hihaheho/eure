name = "eure-dev"
main = "src/worker.ts"
compatibility_date = "2025-12-03"

[build]
command = "dx build --release --features build-image"

[assets]
directory = "../../target/dx/eure-dev/release/web/public"
binding = "ASSETS"
run_worker_first = ["/v*", "/docs/*", "/llms.txt"]
not_found_handling = "single-page-application"
